name: Build OpenWrt packages

# Triggers
# --------
# • push of a tag matching v* — builds musl ELFs + ipks and creates a
#   GitHub Release with the ipks as assets. This is the canonical
#   "release" workflow: tag → built binaries → published release.
# • push to any branch that touches openwrt/**, pyproject.toml, or
#   release/specs/** — sanity-checks the build pipeline but does NOT
#   touch Releases (artifacts only).
# • pull_request touching openwrt/** — same as above.
# • manual dispatch (workflow_dispatch) for ad-hoc builds.

on:
  push:
    branches: ['**']
    tags: ['v*']
    paths:
      - 'openwrt/**'
      - 'release/specs/**'
      - 'release/build.py'
      - 'pyproject.toml'
      - 'mitmproxy/tools/main.py'
      # Workflow edits don't auto-trigger otherwise — without this, fixing
      # openwrt.yml alone leaves the CI stuck on the old definition until
      # somebody also touches openwrt/** or pushes a tag.
      - '.github/workflows/openwrt.yml'
  pull_request:
    paths:
      - 'openwrt/**'
      - '.github/workflows/openwrt.yml'
  workflow_dispatch:
    inputs:
      skip_musl_build:
        description: 'Skip musl-binary job (use existing artifacts)'
        type: boolean
        default: false
      openwrt_version:
        description: 'OpenWrt SDK version (e.g. 24.10.0). Leave empty for default.'
        type: string
        default: ''

# Minimal read perms are enough; no code is published from this workflow.
permissions:
  contents: read

concurrency:
  group: openwrt-${{ github.ref }}
  cancel-in-progress: true

# Default OpenWrt SDK version — match the lowest version we still support
# (currently 24.10.0). Override per-run via the workflow_dispatch input.
env:
  DEFAULT_OPENWRT_VERSION: '24.10.0'

jobs:
  # ---------------------------------------------------------------------------
  # 1. Build standalone musl-linked mitmweb ELFs for x86_64 and aarch64.
  #    Output: a tarball per arch, uploaded as a GitHub Actions artifact.
  # ---------------------------------------------------------------------------
  musl-binary:
    name: musl binary (${{ matrix.arch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [x86_64]   # aarch64 builds via QEMU emulation take >1h; see openwrt-package matrix for the same comment
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up QEMU for cross-arch docker builds
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Resolve mitmproxy version
        id: ver
        run: |
          # pyproject.toml has `dynamic = ["version"]`, so there is no
          # literal `version = "..."` line to grep. mitmproxy/version.py
          # is the actual source-of-truth: VERSION = "13.0.0.dev" etc.
          #
          # Both this step and the one in openwrt-package output
          # `version=v${VERSION}` so the tarball filename produced here
          # (which feeds into the upload-artifact path glob) matches the
          # filename the SDK Makefile expects (`TARBALL_NAME` derives
          # from MITMWEB_VERSION=v<VERSION>).
          VERSION=$(sed -nE 's/^VERSION[[:space:]]*=[[:space:]]*"([^"]+)".*/\1/p' \
              mitmproxy/version.py | head -n1)
          [ -n "$VERSION" ] || { echo "could not read VERSION from mitmproxy/version.py" >&2; exit 1; }
          echo "version=v${VERSION}" >> "$GITHUB_OUTPUT"
          echo "version=v${VERSION}"

      - name: Build mitmweb ELF (musl, ${{ matrix.arch }})
        run: |
          chmod +x openwrt/tools/build-mitmweb-musl.sh
          cd openwrt/tools
          ./build-mitmweb-musl.sh \
              --arch ${{ matrix.arch }} \
              --tag ${{ steps.ver.outputs.version }} \
              --out "$GITHUB_WORKSPACE/release/dist"

      - name: Upload musl tarball artifact
        uses: actions/upload-artifact@v4
        with:
          name: mitmweb-musl-${{ matrix.arch }}
          path: release/dist/mitmweb-linux-musl-${{ matrix.arch }}-${{ steps.ver.outputs.version }}.tar.xz
          if-no-files-found: error
          retention-days: 14

  # ---------------------------------------------------------------------------
  # 2. Use the musl tarball + an OpenWrt SDK to produce ipk files.
  #    The matrix below maps each supported (target, sdk) onto the right musl
  #    arch and SDK URL. SDK URLs follow the convention:
  #       releases/<version>/targets/<target>/<subtarget>/openwrt-sdk-<version>-<profile>_gcc-<ver>_<libc>.Linux-<host>.tar.xz
  #
  #    To add a new target, append a row to the matrix below and (optionally)
  #    extend the musl-binary matrix above.
  # ---------------------------------------------------------------------------
  openwrt-package:
    name: ipk (${{ matrix.profile }})
    needs: musl-binary
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # x86/64 is the 64-bit x86 target. x86/generic is 32-bit (i386), and
          # would mismatch our x86_64 musl binary — libc.musl-x86_64.so.1 vs
          # libc.musl-i386.so.1 — so we use the 64-bit target.
          - sdk_url: https://downloads.openwrt.org/releases/24.10.0/targets/x86/64/openwrt-sdk-24.10.0-x86-64_gcc-13.3.0_musl.Linux-x86_64.tar.zst
            profile: x86_64
            mitmweb_arch: x86_64
          # aarch64 musl build takes >1h on GitHub Actions runners because
          # Docker's QEMU emulation of linux/arm64 is ~10x slower than
          # native x86_64 build. Disabled until we either find a way to
          # build natively (e.g. arm64 self-hosted runner) or speed up
          # the cross-compile.
          # - sdk_url: https://downloads.openwrt.org/releases/24.10.0/targets/armsr/armv8/openwrt-sdk-24.10.0-armsr-armv8_gcc-13.3.0_musl.Linux-x86_64.tar.zst
          #   profile: armsr-armv8
          #   mitmweb_arch: aarch64

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Resolve OpenWrt SDK URL (override from workflow_dispatch)
        id: sdkurl
        run: |
          input_ver="${{ inputs.openwrt_version }}"
          if [ -n "$input_ver" ]; then
            # Swap in the user-specified OpenWrt version segment of the URL.
            echo "sdk_url=$(echo "${{ matrix.sdk_url }}" | sed "s|releases/[^/]*|releases/${input_ver}|")" \
                >> "$GITHUB_OUTPUT"
          else
            echo "sdk_url=${{ matrix.sdk_url }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download the matching musl tarball artifact
        uses: actions/download-artifact@v4
        with:
          name: mitmweb-musl-${{ matrix.mitmweb_arch }}
          path: dl_in
          merge-multiple: false

      - name: Download OpenWrt SDK
        run: |
          set -euo pipefail
          # OpenWrt 24.10 publishes SDKs as .tar.zst. Ubuntu runners don't
          # necessarily ship tar with zstd support compiled in, and
          # `tar --use-compress-program=zstd` exits 22 ("Cannot exec")
          # if the binary isn't found. So decompress explicitly first.
          curl -fL --retry 3 -o sdk.tar.zst "${{ steps.sdkurl.outputs.sdk_url }}"
          zstd -d -o sdk.tar sdk.tar.zst
          mkdir -p sdk
          tar -xf sdk.tar --strip-components=1 -C sdk

      - name: Stage this package and the musl tarball
        run: |
          set -euo pipefail
          # Drop our package tree into the SDK's package/ tree. OpenWrt's
          # BuildPackage walks the immediate subdirectories of each
          # package/<name>/ looking for a Makefile, so the directory name
          # is what we'll see in `make package/.../...` paths.
          cp -r openwrt "sdk/package/mitmweb-openwrt"
          # Place the musl tarball in dl/; $(DL_DIR) defaults to sdk/dl/.
          #
          # Caveat: `actions/download-artifact@v4` preserves the upload-side
          # directory structure, so the tarball lands at
          # `dl_in/release/dist/<name>.tar.xz` (matching the upload path),
          # not `dl_in/<name>.tar.xz`. A `dl_in/*.tar.xz` glob would only
          # match a flat layout and silently fail to copy anything, leaving
          # sdk/dl/ empty and the Makefile's [ -f $(TARBALL_PATH) ] check
          # to fire later. Use `find` to walk any subdir shape.
          mkdir -p sdk/dl
          find dl_in -name '*.tar.xz' -type f -exec cp -v {} sdk/dl/ \;
          ls -la sdk/dl/

      - name: Resolve mitmproxy version (for the SDK Makefile)
        id: ver
        run: |
          # pyproject.toml has `dynamic = ["version"]`, so there is no
          # literal `version = "..."` line to grep. mitmproxy/version.py
          # is the actual source of truth: VERSION = "13.0.0.dev" etc.
          VERSION=$(sed -nE 's/^VERSION[[:space:]]*=[[:space:]]*"([^"]+)".*/\1/p' \
              mitmproxy/version.py | head -n1)
          [ -n "$VERSION" ] || { echo "could not read VERSION from mitmproxy/version.py" >&2; exit 1; }
          echo "version=v${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Build ipk in the SDK
        run: |
          set -euo pipefail
          cd sdk
          # Install all feeds (packages, luci, ...) so dependency lookups
          # for iptables-nft, kmod-nf-redirect, luci-base etc. succeed.
          #
          # Override the SDK's default feeds.conf.default with a
          # GitHub-mirror-only config. The default points at
          # git.openwrt.org which has periodic outages and is slow from
          # GitHub Actions runners; GitHub's own mirrors of the same
          # repos are inside the runner's network and never fail.
          # mitmweb only consumes packages + luci; we deliberately
          # drop routing/telephony/base to keep the surface area small.
          rm -f feeds.conf
          # Avoid heredoc: in a YAML | block any extra indent is preserved
          # literally by bash, which the OpenWrt feeds parser then rejects
          # as "Syntax error in feeds.conf, line 1". A brace-group of
          # echo statements writes each line flush-left reliably.
          {
            echo 'src-git packages https://github.com/openwrt/packages.git;openwrt-24.10'
            echo 'src-git luci https://github.com/openwrt/luci.git;openwrt-24.10'
          } > feeds.conf
          # IMPORTANT: do NOT use './scripts/feeds update -i <feed>' here.
          # The -i flag re-indexes an already-cloned feed without running
          # the git clone step. On a fresh SDK that produces an empty
          # packages.index (.packageinfo of 0 bytes, feeds/packages/
          # never populated). Plain './scripts/feeds update' runs the
          # full clone + index pass and works.
          ok=0
          for attempt in 1 2 3; do
              echo "=== ./scripts/feeds update (attempt $attempt/3) ==="
              if ./scripts/feeds update; then
                  ok=1
                  break
              fi
              echo "=== attempt $attempt failed; sleeping $((attempt*5))s ==="
              sleep $((attempt*5))
          done
          # feeds.conf has only packages + luci; verify both indexes
          # exist and are non-empty. feeds/<name>.index is a symlink
          # into feeds/<name>.tmp/.<targetinfo>; follow with readlink
          # before size-check so '-s' sees the actual data file.
          for feed in packages luci; do
              index_target="$(readlink -f "feeds/$feed.index" 2>/dev/null || true)"
              if [ -z "$index_target" ] || [ ! -s "$index_target" ]; then
                  echo "ERROR: feed '$feed' index empty or missing (target=$index_target)" >&2
                  echo "===== feeds/ dump =====" >&2
                  ls -laR feeds/ 2>/dev/null | head -40 >&2 || true
                  echo "===== end feeds/ dump =====" >&2
                  exit 1
              fi
              echo "=== $feed index OK ($(wc -l < "$index_target") entries) ==="
          done
          ./scripts/feeds install -a

          # Pre-generate a .config with all defaults. Without this, the
          # first make run tries to open menuconfig interactively, which
          # fails in a non-TTY CI environment with "Error opening
          # terminal: unknown".
          make defconfig

          # Diagnostic dump so we can see what's actually present when
          # the build runs (useful for debugging failed CI runs without
          # log access). Each probe is suffixed with `|| true` / `|| echo`
          # because set -euo pipefail would otherwise kill the script on
          # the first missing dir, hiding the actual failure further down.
          echo "=== package/mitmweb-openwrt tree ==="
          find package/mitmweb-openwrt -maxdepth 2 2>/dev/null | sort || echo "(no tree)"
          # Compute the exact tarball name the Makefile's Build/Compile will
          # look for. PKG_VERSION := $(MITMWEB_VERSION) when MITMWEB_VERSION
          # is set, so this matches `TARBALL_NAME` in openwrt/Makefile.
          expected="mitmweb-linux-musl-${{ matrix.mitmweb_arch }}-${{ steps.ver.outputs.version }}.tar.xz"
          echo "=== dl tarball (expected: $expected) ==="
          (ls -la dl/ 2>/dev/null | grep -E 'mitmweb|^total' || echo "(dl/ missing/empty)") || true
          if [ -f "dl/$expected" ]; then
              echo "OK: dl/$expected is present"
          else
              echo "MISSING: dl/$expected"
          fi
          # Also dump what came out of the download-artifact step, in case
          # the upstream layout ever shifts again. Look one level above too
          # since actions/download-artifact@v4 recreates the upload-time
          # directory under the download path.
          echo "=== what we downloaded from upstream (dl_in/) ==="
          (find ../dl_in -maxdepth 4 -type f 2>/dev/null | sort \
              || echo "(dl_in/ missing or unreadable)") || true
          echo "=== feeds we installed ==="
          (ls feeds/ 2>/dev/null | head) || echo "(no feeds/)"
          echo "=== checking iptables/luci packages exist ==="
          if [ -d package/feeds/packages/iptables-nft ]; then echo "iptables-nft: present"; else echo "iptables-nft: MISSING"; fi
          if [ -d package/feeds/luci/luci-base ]; then echo "luci-base: present"; else echo "luci-base: MISSING"; fi
          if [ -d package/feeds/packages/ca-bundle ]; then echo "ca-bundle: present"; else echo "ca-bundle: MISSING"; fi
          if [ -d package/feeds/packages/libopenssl ]; then echo "libopenssl: present"; else echo "libopenssl: MISSING"; fi

          # Now build our package.
          make package/mitmweb-openwrt/compile V=s \
              MITMWEB_ARCH_HINT=${{ matrix.mitmweb_arch }} \
              MITMWEB_VERSION=${{ steps.ver.outputs.version }}

      - name: Collect built ipks
        run: |
          set -euo pipefail
          mkdir -p ipk_out
          find sdk/bin/packages -name '*.ipk' -exec cp -v {} ipk_out/ \;
          ls -la ipk_out/

      - name: Upload ipk artifact
        uses: actions/upload-artifact@v4
        with:
          name: mitmweb-ipk-${{ matrix.profile }}
          path: ipk_out
          if-no-files-found: error
          retention-days: 14

  # ---------------------------------------------------------------------------
  # 3. On a v* tag push, bundle all built ipks into a GitHub release.
  #    Creates the release if it does not yet exist (a tag push does NOT
  #    auto-create a release on its own — only `release: published` does).
  # ---------------------------------------------------------------------------
  publish-on-release:
    name: publish (release)
    needs: openwrt-package
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all ipk artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Move ipks into a single release folder
        run: |
          mkdir -p release-asset
          find dist -name '*.ipk' -exec cp -v {} release-asset/ \;
          ls -la release-asset/

      - name: Compute sha256sums
        run: |
          (cd release-asset && sha256sum *.ipk > SHA256SUMS)
          cat release-asset/SHA256SUMS

      - name: Create GitHub release and attach ipks
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: 'mitmweb OpenWrt packages (${{ github.ref_name }})'
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            release-asset/*.ipk
            release-asset/SHA256SUMS
